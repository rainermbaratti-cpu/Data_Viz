<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagramma di Kiviat — Grafico Radar Interattivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300..600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-divider: #dcd9d5;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --color-error: #a12c7b;
      --color-success: #437a22;
      --color-gold: #d19900;
      --color-blue: #006494;
      --color-orange: #da7101;
      --color-purple: #7a39bb;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
      --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --font-display: "Instrument Serif", Georgia, serif;
      --font-body: "DM Sans", system-ui, sans-serif;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #1d1c1a;
      --color-divider: #262523;
      --color-border: #393836;
      --color-text: #cdccca;
      --color-text-muted: #797876;
      --color-text-faint: #5a5957;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-primary-highlight: #313b3b;
      --color-error: #d163a7;
      --color-success: #6daa45;
      --color-gold: #e8af34;
      --color-blue: #5591c7;
      --color-orange: #fdab43;
      --color-purple: #a86fdf;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
    }
    /* ===== BASE RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      transition: background var(--transition-interactive), color var(--transition-interactive);
    }
    img, svg { display: block; max-width: 100%; }
    input, button, select { font: inherit; color: inherit; }
    h1,h2,h3 { text-wrap: balance; line-height: 1.2; }
    button { cursor: pointer; background: none; border: none; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    a, button, input { transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ===== LAYOUT ===== */
    .app-header {
      display: flex; align-items: center; justify-content: flex-end;
      padding: var(--space-2) var(--space-6);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface);
      position: sticky; top: 0; z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .logo { display: flex; align-items: center; gap: var(--space-3); text-decoration: none; color: var(--color-text); }
    .logo-icon { color: var(--color-primary); }
    .logo-name { font-family: var(--font-display); font-size: var(--text-lg); }
    .theme-btn {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      display: grid; place-items: center;
      color: var(--color-text-muted);
      background: var(--color-surface-offset);
    }
    .theme-btn:hover { background: var(--color-primary-highlight); color: var(--color-primary); }

    main {
      max-width: 1100px;
      margin-inline: auto;
      padding: var(--space-10) var(--space-6);
      display: grid;
      gap: var(--space-8);
    }

    .hero { text-align: center; padding-block: var(--space-4) var(--space-2); }
    .hero h1 { font-family: var(--font-display); font-size: var(--text-2xl); color: var(--color-text); margin-bottom: var(--space-3); }
    .hero p { font-size: var(--text-base); color: var(--color-text-muted); max-width: 60ch; margin-inline: auto; }

    /* ===== CARDS ===== */
    .card {
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.1);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
    }
    .card-title {
      font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-6);
      color: var(--color-text); display: flex; align-items: center; gap: var(--space-2);
    }
    .card-title .accent { color: var(--color-primary); }

    /* ===== TWO COLUMNS ===== */
    .two-col { display: grid; grid-template-columns: 1fr 1.2fr; gap: var(--space-8); align-items: start; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

    /* ===== FORM ===== */
    .config-section { display: flex; flex-direction: column; gap: var(--space-6); }

    .axes-config { display: flex; flex-direction: column; gap: var(--space-3); }

    .field-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: var(--space-2);
      align-items: center;
    }
    .field-name {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text);
      width: 100%;
    }
    .field-name:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; border-color: transparent; }

    .remove-btn {
      width: 32px; height: 32px; border-radius: var(--radius-md);
      display: grid; place-items: center;
      color: var(--color-text-faint);
      background: transparent;
      border: 1px solid transparent;
      font-size: 18px; line-height: 1;
    }
    .remove-btn:hover { color: var(--color-error); background: color-mix(in oklch, var(--color-error) 10%, var(--color-surface)); border-color: color-mix(in oklch, var(--color-error) 20%, var(--color-border)); }

    .add-axis-btn {
      display: flex; align-items: center; gap: var(--space-2);
      background: transparent;
      border: 1.5px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      width: 100%;
      justify-content: center;
    }
    .add-axis-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-highlight); }

    /* ===== DATASETS ===== */
    .datasets-section { display: flex; flex-direction: column; gap: var(--space-4); }
    .dataset-card {
      background: var(--color-surface-2);
      border: 1px solid oklch(from var(--color-text) l c h / 0.07);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .dataset-header {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface);
    }
    .color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .dataset-label {
      flex: 1; background: none; border: none;
      font-size: var(--text-sm); font-weight: 500;
      color: var(--color-text);
      padding: 0;
    }
    .dataset-label:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: 2px; }

    .ds-color-picker {
      width: 32px; height: 32px;
      border: none; border-radius: var(--radius-sm);
      padding: 2px; cursor: pointer;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .ds-color-picker::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
    .ds-color-picker::-webkit-color-swatch { border: none; border-radius: 4px; }
    .ds-color-picker::-moz-color-swatch { border: none; border-radius: 4px; }

    .axis-color {
      width: 32px; height: 32px;
      border: none; border-radius: var(--radius-sm);
      padding: 2px; cursor: pointer;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .axis-color::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
    .axis-color::-webkit-color-swatch { border: none; border-radius: 4px; }
    .axis-color::-moz-color-swatch { border: none; border-radius: 4px; }

    .remove-dataset-btn {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      display: grid; place-items: center;
      color: var(--color-text-faint);
      font-size: 16px;
    }
    .remove-dataset-btn:hover { color: var(--color-error); background: color-mix(in oklch, var(--color-error) 10%, transparent); }
    .dataset-values {
      display: grid; gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
    }
    .value-row { display: grid; grid-template-columns: 1fr auto; gap: var(--space-3); align-items: center; }
    .value-label { font-size: var(--text-xs); color: var(--color-text-muted); text-align: right; }
    .value-input {
      width: 80px; text-align: right;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-sm);
      font-variant-numeric: tabular-nums;
    }
    .value-input:focus { outline: 2px solid var(--color-primary); outline-offset: 1px; border-color: transparent; }

    .add-dataset-btn {
      display: flex; align-items: center; gap: var(--space-2);
      background: transparent;
      border: 1.5px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      width: 100%; justify-content: center;
    }
    .add-dataset-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-highlight); }

    /* ===== RANGE CONFIG ===== */
    .range-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
    .field-group { display: flex; flex-direction: column; gap: var(--space-1); }
    .field-label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    .field-input {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      font-variant-numeric: tabular-nums;
    }
    .field-input:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; border-color: transparent; }

    /* ===== CHART ===== */
    .chart-wrapper {
      position: sticky; top: 80px;
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.1);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .chart-title {
      font-family: var(--font-display); font-size: var(--text-lg);
      color: var(--color-text); text-align: center;
    }
    .chart-canvas-wrap { position: relative; width: 100%; aspect-ratio: 1/1; max-height: 420px; }

    /* ===== EXPORT ===== */
    .export-row { display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm); font-weight: 500;
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-outline { background: transparent; border-color: var(--color-border); color: var(--color-text-muted); }
    .btn-outline:hover { background: var(--color-surface-offset); color: var(--color-text); border-color: var(--color-text-muted); }

    /* ===== LEGEND ===== */
    .legend { display: flex; flex-wrap: wrap; gap: var(--space-3); justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--color-text-muted); }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* ===== SECTION DIVIDER ===== */
    .section-label {
      font-size: var(--text-xs); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }
    .divider { border: none; border-top: 1px solid var(--color-divider); margin-block: var(--space-4); }

    /* ===== EMPTY STATE ===== */
    .empty-msg { text-align: center; color: var(--color-text-faint); font-size: var(--text-sm); padding: var(--space-8); }

    @media (max-width: 480px) {
      .card { padding: var(--space-4); }
      .chart-wrapper { padding: var(--space-4); }
      main { padding: var(--space-6) var(--space-4); }
    }
  </style>
</head>
<body>

<header class="app-header">
  <button class="theme-btn" data-theme-toggle aria-label="Cambia tema">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<main>
  <div class="hero">
    <h1>Diagramma di Kiviat</h1>
    <p>Inserisci le dimensioni e i valori numerici per generare un grafico radar interattivo in tempo reale.</p>
  </div>

  <div class="two-col">
    <!-- LEFT: configurazione -->
    <div class="config-section">

      <!-- Assi -->
      <div class="card">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>Dimensioni <span class="accent">(assi)</span></span>
        </div>
        <p class="section-label">Etichette degli assi</p>
        <div class="axes-config" id="axesList"></div>
        <button class="add-axis-btn" id="addAxisBtn" style="margin-top: var(--space-3)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Aggiungi dimensione
        </button>

        <hr class="divider">

        <p class="section-label">Scala dei valori</p>
        <div class="range-row">
          <div class="field-group">
            <label class="field-label" for="minVal">Minimo</label>
            <input class="field-input" type="number" id="minVal" value="0" step="any">
          </div>
          <div class="field-group">
            <label class="field-label" for="maxVal">Massimo</label>
            <input class="field-input" type="number" id="maxVal" value="100" step="any">
          </div>
        </div>
      </div>

      <!-- Dataset -->
      <div class="card">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Dataset
        </div>
        <div class="datasets-section" id="datasetsList"></div>
        <button class="add-dataset-btn" id="addDatasetBtn" style="margin-top: var(--space-3)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Aggiungi dataset
        </button>
      </div>
    </div>

    <!-- RIGHT: grafico -->
    <div class="chart-wrapper">
      <div class="chart-title">Anteprima del grafico</div>
      <div class="chart-canvas-wrap">
        <canvas id="radarChart" aria-label="Grafico radar / diagramma di Kiviat"></canvas>
      </div>
      <div class="legend" id="legend"></div>
      <div class="export-row">
        <button class="btn btn-primary" id="downloadPng">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Scarica PNG
        </button>
        <button class="btn btn-outline" id="exportSvg">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Esporta SVG
        </button>
        <button class="btn btn-outline" id="copyData">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copia CSV
        </button>
      </div>
    </div>
  </div>
</main>

<script>
// ============================
// STATE
// ============================
const PALETTE = [
  { fill: '#01696f', stroke: '#01696f' },
  { fill: '#006494', stroke: '#006494' },
  { fill: '#da7101', stroke: '#da7101' },
  { fill: '#7a39bb', stroke: '#7a39bb' },
  { fill: '#d19900', stroke: '#d19900' },
  { fill: '#a12c7b', stroke: '#a12c7b' },
  { fill: '#437a22', stroke: '#437a22' },
];
const PALETTE_DARK = [
  { fill: '#4f98a3', stroke: '#4f98a3' },
  { fill: '#5591c7', stroke: '#5591c7' },
  { fill: '#fdab43', stroke: '#fdab43' },
  { fill: '#a86fdf', stroke: '#a86fdf' },
  { fill: '#e8af34', stroke: '#e8af34' },
  { fill: '#d163a7', stroke: '#d163a7' },
  { fill: '#6daa45', stroke: '#6daa45' },
];

let axes = ['Dimensione 1', 'Dimensione 2', 'Dimensione 3', 'Dimensione 4', 'Dimensione 5'];
let axisColors = ['#01696f', '#006494', '#da7101', '#7a39bb', '#d19900'];
let datasets = [
  { label: 'Entità 1', color: '#01696f', values: [70, 85, 60, 90, 55] },
  { label: 'Entità 2', color: '#006494', values: [50, 65, 80, 40, 75] },
];
let minVal = 0, maxVal = 100;

// ============================
// CHART
// ============================
const ctx = document.getElementById('radarChart').getContext('2d');
let chart = null;

function isDark() {
  return document.documentElement.getAttribute('data-theme') === 'dark';
}

function palette() { return isDark() ? PALETTE_DARK : PALETTE; }

function getChartColors() {
  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--color-text').trim();
  const mutedColor = getComputedStyle(document.documentElement).getPropertyValue('--color-text-muted').trim();
  const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--color-divider').trim();
  return { textColor, mutedColor, gridColor };
}

function buildDatasets() {
  return datasets.map((ds, i) => {
    const color = ds.color || palette()[i % palette().length].fill;
    return {
      label: ds.label,
      data: ds.values.slice(0, axes.length),
      backgroundColor: hexToRgba(color, 0.18),
      borderColor: color,
      borderWidth: 2,
      pointBackgroundColor: color,
      pointBorderColor: '#fff',
      pointHoverBackgroundColor: '#fff',
      pointHoverBorderColor: color,
      pointRadius: 4,
      pointHoverRadius: 6,
    };
  });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderChart() {
  const { textColor, mutedColor, gridColor } = getChartColors();
  const data = { labels: axes, datasets: buildDatasets() };
  const options = {
    responsive: true,
    maintainAspectRatio: true,
    animation: { duration: 400, easing: 'easeInOutQuart' },
    plugins: {
      legend: { display: false },
      axisLabelColors: {
        id: 'axisLabelColors',
        beforeDraw(chart) {
          // Draw colored wedge sectors behind the chart
          const scale = chart.scales.r;
          if (!scale) return;
          const ctx2 = chart.ctx;
          const cx = scale.xCenter, cy = scale.yCenter;
          const count = axes.length;
          if (count < 3) return;
          // Get outer radius (distance to outermost ring)
          const outerR = scale.drawingArea;
          const angleStep = (Math.PI * 2) / count;
          // Chart.js radar starts at top (-PI/2) and goes clockwise
          const startAngle = -Math.PI / 2;
          ctx2.save();
          ctx2.globalAlpha = 0.10;
          for (let i = 0; i < count; i++) {
            const color = axisColors[i] || '#01696f';
            const a1 = startAngle + i * angleStep - angleStep / 2;
            const a2 = startAngle + i * angleStep + angleStep / 2;
            ctx2.beginPath();
            ctx2.moveTo(cx, cy);
            ctx2.arc(cx, cy, outerR, a1, a2);
            ctx2.closePath();
            ctx2.fillStyle = color;
            ctx2.fill();
          }
          ctx2.restore();
        },
        afterDraw(chart) {
          // Draw colored point labels
          const scale = chart.scales.r;
          if (!scale || !scale._pointLabelItems) return;
          const ctx2 = chart.ctx;
          scale._pointLabelItems.forEach((item, i) => {
            if (!axisColors[i]) return;
            ctx2.save();
            ctx2.fillStyle = axisColors[i];
            ctx2.font = '600 12px DM Sans, system-ui, sans-serif';
            ctx2.textAlign = item.textAlign || 'center';
            ctx2.textBaseline = 'middle';
            const lines = scale._pointLabels[i];
            if (Array.isArray(lines)) {
              lines.forEach((line, li) => {
                ctx2.fillText(line, item.x, item.y + li * 14);
              });
            } else {
              ctx2.fillText(lines, item.x, item.y);
            }
            ctx2.restore();
          });
        }
      },
      tooltip: {
        backgroundColor: isDark() ? '#1c1b19' : '#fff',
        borderColor: gridColor,
        borderWidth: 1,
        titleColor: textColor,
        bodyColor: mutedColor,
        padding: 10,
        cornerRadius: 8,
        callbacks: {
          label: ctx => `  ${ctx.dataset.label}: ${ctx.raw}`
        }
      }
    },
    scales: {
      r: {
        min: minVal,
        max: maxVal,
        ticks: {
          stepSize: (maxVal - minVal) / 5,
          color: mutedColor,
          backdropColor: 'transparent',
          font: { size: 11, family: 'DM Sans, system-ui, sans-serif' },
          callback: val => val
        },
        pointLabels: {
          color: 'transparent',
          font: { size: 12, weight: '500', family: 'DM Sans, system-ui, sans-serif' }
        },
        grid: { color: gridColor },
        angleLines: { color: gridColor }
      }
    }
  };

  if (chart) {
    chart.data = data;
    chart.options = options;
    chart.update();
  } else {
    const axisColorPlugin = options.plugins.axisLabelColors;
    delete options.plugins.axisLabelColors;
    chart = new Chart(ctx, { type: 'radar', data, options, plugins: [axisColorPlugin] });
  }
  renderLegend();
}

function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = datasets.map((ds, i) => {
    const color = ds.color || palette()[i % palette().length].fill;
    return `<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${ds.label}</span>`;
  }).join('');
}

// ============================
// AXES UI
// ============================
function renderAxes() {
  const list = document.getElementById('axesList');
  list.innerHTML = '';
  axes.forEach((ax, i) => {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.innerHTML = `
      <input class="axis-color" type="color" value="${axisColors[i] || '#01696f'}" aria-label="Colore dimensione ${i+1}" data-axis="${i}" title="Colore asse">
      <input class="field-name" type="text" value="${ax}" aria-label="Nome dimensione ${i+1}" data-axis="${i}">
      <button class="remove-btn" aria-label="Rimuovi dimensione ${i+1}" data-remove-axis="${i}" title="Rimuovi">×</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.field-name').forEach(inp => inp.addEventListener('input', e => {
    axes[+e.target.dataset.axis] = e.target.value;
    renderDatasetValues();
    renderChart();
  }));
  list.querySelectorAll('.remove-btn').forEach(btn => btn.addEventListener('click', e => {
    const idx = +e.currentTarget.dataset.removeAxis;
    if (axes.length <= 3) return;
    axes.splice(idx, 1);
    datasets.forEach(ds => ds.values.splice(idx, 1));
    renderAxes();
    renderDatasets();
    renderChart();
  }));
}

document.getElementById('addAxisBtn').addEventListener('click', () => {
  const defaultColors = ['#01696f','#006494','#da7101','#7a39bb','#d19900','#a12c7b','#437a22'];
  axisColors.push(defaultColors[axes.length % defaultColors.length]);
  axes.push(`Dimensione ${axes.length + 1}`);
  datasets.forEach(ds => ds.values.push(50));
  renderAxes();
  renderDatasets();
  renderChart();
});

// ============================
// DATASETS UI
// ============================
function renderDatasets() {
  const list = document.getElementById('datasetsList');
  list.innerHTML = '';
  if (datasets.length === 0) {
    list.innerHTML = '<p class="empty-msg">Nessun dataset. Aggiungine uno.</p>';
    return;
  }
  datasets.forEach((ds, di) => {
    const c = palette()[di % palette().length];
    const card = document.createElement('div');
    card.className = 'dataset-card';
    card.innerHTML = `
      <div class="dataset-header">
        <input class="ds-color-picker" type="color" value="${ds.color || '#01696f'}" aria-label="Colore entità ${di+1}" data-ds="${di}" title="Cambia colore">
        <input class="dataset-label" type="text" value="${ds.label}" aria-label="Nome dataset ${di+1}" data-ds="${di}">
        ${datasets.length > 1 ? `<button class="remove-dataset-btn" data-remove-ds="${di}" aria-label="Rimuovi dataset ${di+1}" title="Rimuovi">×</button>` : ''}
      </div>
      <div class="dataset-values" id="vals-${di}"></div>
    `;
    list.appendChild(card);
    renderDatasetValues(di, card.querySelector(`#vals-${di}`));
  });

  list.querySelectorAll('.dataset-label').forEach(inp => inp.addEventListener('input', e => {
    datasets[+e.target.dataset.ds].label = e.target.value;
    renderLegend();
    renderChart();
  }));
  list.querySelectorAll('.ds-color-picker').forEach(inp => inp.addEventListener('input', e => {
    datasets[+e.target.dataset.ds].color = e.target.value;
    renderLegend();
    renderChart();
  }));
  list.querySelectorAll('.remove-dataset-btn').forEach(btn => btn.addEventListener('click', e => {
    datasets.splice(+e.currentTarget.dataset.removeDs, 1);
    renderDatasets();
    renderChart();
  }));
}

function renderDatasetValues(di, container) {
  if (di === undefined) {
    // re-render all
    datasets.forEach((_, i) => {
      const c = document.getElementById(`vals-${i}`);
      if (c) renderDatasetValues(i, c);
    });
    return;
  }
  const ds = datasets[di];
  container.innerHTML = '';
  axes.forEach((ax, ai) => {
    const row = document.createElement('div');
    row.className = 'value-row';
    row.innerHTML = `
      <label class="value-label" for="v-${di}-${ai}">${ax || 'Asse ' + (ai+1)}</label>
      <input class="value-input" type="number" id="v-${di}-${ai}" value="${ds.values[ai] !== undefined ? ds.values[ai] : 50}" step="any" data-ds="${di}" data-ax="${ai}">
    `;
    container.appendChild(row);
    row.querySelector('input').addEventListener('input', e => {
      const val = parseFloat(e.target.value);
      datasets[+e.target.dataset.ds].values[+e.target.dataset.ax] = isNaN(val) ? 0 : val;
      renderChart();
    });
  });
}

let dsCounter = 3;
document.getElementById('addDatasetBtn').addEventListener('click', () => {
  const dsColors = ['#01696f','#006494','#da7101','#7a39bb','#d19900','#a12c7b','#437a22'];
  datasets.push({ label: `Entità ${dsCounter++}`, color: dsColors[(datasets.length) % dsColors.length], values: axes.map(() => Math.round(30 + Math.random()*50)) });
  renderDatasets();
  renderChart();
});

// ============================
// RANGE
// ============================
document.getElementById('minVal').addEventListener('input', e => {
  minVal = parseFloat(e.target.value) || 0; renderChart();
});
document.getElementById('maxVal').addEventListener('input', e => {
  maxVal = parseFloat(e.target.value) || 100; renderChart();
});

// ============================
// EXPORT
// ============================
document.getElementById('downloadPng').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = chart.toBase64Image('image/png', 1);
  a.download = 'kiviat-chart.png';
  a.click();
});

document.getElementById('exportSvg').addEventListener('click', () => {
  const svgData = `
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <rect width="600" height="600" fill="${isDark() ? '#1c1b19' : '#f9f8f5'}"/>
  <image href="${chart.toBase64Image('image/png', 1)}" x="0" y="0" width="600" height="600"/>
</svg>`;
  const blob = new Blob([svgData], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kiviat-chart.svg';
  a.click();
});

document.getElementById('copyData').addEventListener('click', () => {
  let csv = ',' + axes.join(',') + '\n';
  datasets.forEach(ds => {
    csv += ds.label + ',' + ds.values.slice(0, axes.length).join(',') + '\n';
  });
  navigator.clipboard.writeText(csv).then(() => {
    const btn = document.getElementById('copyData');
    btn.textContent = '✓ Copiato!';
    setTimeout(() => {
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copia CSV`;
    }, 1500);
  });
});

// ============================
// THEME TOGGLE
// ============================
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  updateThemeIcon(t, d);
  t && t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    updateThemeIcon(t, d);
    // re-render chart with new colors
    setTimeout(() => { if (chart) { chart.destroy(); chart = null; renderChart(); } }, 50);
  });
  function updateThemeIcon(btn, theme) {
    if (!btn) return;
    btn.setAttribute('aria-label', 'Passa a tema ' + (theme === 'dark' ? 'chiaro' : 'scuro'));
    btn.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
})();

// ============================
// INIT
// ============================
renderAxes();
renderDatasets();
renderChart();
</script>
</body>
</html>
